<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-Tracker Side Panel</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="xt-container">
    <div class="xt-header">
      <div class="xt-title">
        <div class="xt-greeting-line">
          <span class="xt-greeting-emoji" aria-hidden="true">👋</span>
          <span class="xt-greeting-hello" data-i18n="greeting_hi">Hi</span>
          <span class="xt-greeting-subtitle" data-i18n="greeting_subtitle">It’s a new day.</span>
        </div>
      </div>

      <div class="xt-controls">
        <button class="xt-btn" id="xt-lang-toggle" type="button" title="Switch Language" aria-label="Switch Language">
          <span class="xt-btn-text" style="font-size: 14px; font-weight: 600;">EN</span>
        </button>
        <!-- Settings Toggle Removed -->
        <button class="xt-btn" id="xt-refresh" type="button" title="Reload" aria-label="Reload">
          <svg class="xt-btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M20 12a8 8 0 1 1-2.3-5.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20 4v6h-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
    
    <div class="xt-nav-tabs">
        <button id="nav-feed" class="nav-tab-btn active" data-i18n="nav_feed">Feed</button>
        <button id="nav-lists" class="nav-tab-btn" data-i18n="nav_lists">Lists</button>
    </div>
    
    <div class="xt-content" id="xt-content">
      <!-- Feed View -->
      <div id="feedView" class="view-section">
        <div id="feedContainer">
            <!-- Feed Items will be injected here -->
            <div class="empty-state">
              No sources to check.<br><br>
              1. Go to <b>Lists</b> tab.<br>
              2. Add users/links.<br>
              3. Come back here to track them.
            </div>
        </div>
      </div>

      <!-- Lists View (formerly Settings View) -->
      <div id="listsView" class="view-section hidden">
        
        <!-- List Management (Removed as per user request) -->
        <!-- <div class="list-management" style="margin-bottom: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span style="font-size: 14px; font-weight: 600;" data-i18n="label_lists">Lists</span>
                <button id="newListBtn" class="text-btn" data-i18n="btn_new_list">+ New List</button>
            </div>
            <div id="tabsList" class="tabs-list"></div>
        </div> -->

        <div class="input-group-container">
          <div class="input-group">
            <input type="text" id="userInput" placeholder="X / Weibo / Xueqiu username or URL" data-i18n-placeholder="input_placeholder" />
            <button id="addBtn" class="primary-btn" data-i18n="btn_add">Add</button>
          </div>
          <div id="inputError" class="input-error hidden">Invalid format</div>
        </div>

        <div class="list-container">
          <div class="list-header">
            <div class="list-title-wrapper">
                <select id="listSelect" class="list-select">
                    <!-- Options will be populated by JS -->
                </select>
                <button id="editListBtn" class="action-icon-btn hidden" title="Rename">✎</button>
                <button id="deleteListBtn" class="action-icon-btn delete hidden" title="Delete">×</button>
            </div>
            <div class="list-actions-container">
                <button id="listMenuBtn" class="action-icon-btn" title="More">⋮</button>
                <div id="listMenuDropdown" class="list-menu-dropdown hidden">
                    <button id="newListBtn" class="menu-item" data-i18n="btn_new_list">+ New List</button>
                    <button id="importBtn" class="menu-item" data-i18n="btn_import">Import</button>
                    <button id="exportBtn" class="menu-item" data-i18n="btn_export">Export</button>
                </div>
                <input type="file" id="importInput" accept=".json" style="display:none;" />
            </div>
          </div>
          <ul id="userList">
            <!-- Users will be added here -->
          </ul>
          <div id="emptyStateList" class="empty-state" style="padding: 20px 0;" data-i18n="empty_list">
            No users added yet.
          </div>
        </div>

        <div class="controls">
          <div class="control-row" style="justify-content: flex-start; gap: 8px;">
            <input type="checkbox" id="includeReplies">
            <label for="includeReplies" data-i18n="label_include_replies">Include Replies (X only)</label>
          </div>
        </div>

        <button id="fetchBtn" class="primary-btn full-width-btn" data-i18n="btn_fetch">Open Selected</button>
      </div>
    </div>
  </div>
  <script src="sidepanel.js?v=1.5"></script>
</body>
</html>
